<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Romantic Promise ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;600;700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Full Screen Immersive Background */
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #fe9aab, #fecfef);
            background-size: 400% 400%;
            animation: elegantBg 12s ease infinite;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
            position: relative;
        }

        @keyframes elegantBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Name Input Overlay */
        .name-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .name-box {
            background: rgba(255, 255, 255, 0.85);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .name-box h2 {
            color: #d90429;
            font-size: 26px;
            margin-bottom: 20px;
        }

        .name-box input {
            width: 100%;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #ffb3c6;
            border-radius: 50px;
            outline: none;
            text-align: center;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .name-box input:focus {
            border-color: #d90429;
            box-shadow: 0 0 15px rgba(217, 4, 41, 0.2);
        }

        .name-box button {
            background: #d90429;
            color: white;
            padding: 12px 35px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(217, 4, 41, 0.3);
        }

        /* Main Proposal Container */
        .proposal-container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 92%;
            max-width: 500px;
            padding: 40px 25px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 35px 70px rgba(255, 77, 109, 0.25);
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            position: relative;
        }

        /* Shayaris Section */
        .shayari-canvas {
            font-family: 'Caveat', cursive;
            font-size: 34px;
            color: #d90429;
            min-height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
            transition: opacity 0.5s ease-in-out;
        }

        /* GIF Frame */
        .gif-frame {
            margin-bottom: 25px;
        }

        .gif-frame img {
            width: 200px;
            height: 200px;
            object-fit: contain;
            border-radius: 30px;
        }

        .proposal-text {
            font-size: 24px;
            font-weight: 700;
            color: #4a00e0;
            margin-bottom: 30px;
        }

        /* Buttons Container Zone */
        .buttons-wrapper {
            position: relative;
            height: 180px; /* Thoda height bada kiya taaki safe zone points mil sakein */
            width: 100%;
        }

        .action-btn {
            padding: 14px 40px;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: absolute;
            transition: all 0.12s ease-out; /* Ultra snappy response */
        }

        /* Yes Button Style - Static in Center */
        #yesBtn {
            background: linear-gradient(135deg, #ff0055 0%, #d90429 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(217, 4, 41, 0.4);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        #yesBtn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 15px 35px rgba(217, 4, 41, 0.6);
        }

        /* No Button Style */
        #noBtn {
            background: rgba(255, 255, 255, 0.95);
            color: #d90429;
            border: 2px solid #d90429;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            user-select: none;
            z-index: 20; /* Keep it on top so it handles touches perfectly */
        }

        /* Warning Notice text styling */
        .warning-text {
            margin-top: 15px;
            font-size: 16px;
            font-weight: 600;
            color: #d90429;
            min-height: 25px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Floating Hearts */
        .heart-stream {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Footer Signature */
        .footer-signature {
            position: absolute;
            bottom: 20px;
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            font-style: italic;
            color: #66434f;
            letter-spacing: 1px;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
            z-index: 10;
            width: 100%;
            left: 0;
        }

        .footer-signature span {
            font-weight: bold;
            color: #d90429;
        }
    </style>
</head>
<body>

    <div class="heart-stream" id="heartBox"></div>

    <div class="name-overlay" id="nameOverlay">
        <div class="name-box">
            <h2>Apna Pyaara Sa Naam Likho ✨</h2>
            <input type="text" id="userNameInput" placeholder="Yahan naam likhein..." autocomplete="off">
            <br>
            <button onclick="startProposal()">Enter</button>
        </div>
    </div>

    <div class="proposal-container" id="mainProposalCard">
        <div class="shayari-canvas" id="shayariText">
            "Suno... Tum meri wo aadat ho, jise main kabhi chhodna nahi chahta! ❤️"
        </div>

        <div class="gif-frame">
            <img id="catDisplay" src="billi.gif" alt="Billi Proposal">
        </div>
        
        <div class="proposal-text" id="questionText">Hey, Kya tum meri bae banogi? 💍</div>

        <div class="buttons-wrapper" id="btnWrapper">
            <button class="action-btn" id="yesBtn" onclick="celebrateYes()">Yes, I Do!</button>
            <button class="action-btn" id="noBtn" 
                    onmouseover="jumpToSafeSpot(event)" 
                    onclick="jumpToSafeSpot(event)" 
                    onmousedown="jumpToSafeSpot(event)" 
                    ontouchstart="jumpToSafeSpot(event)">No</button>
        </div>

        <div class="warning-text" id="warningNotice"></div>
    </div>

    <div class="footer-signature">Made with ❤️ by <span>Altaf Raja</span></div>

    <script {nonce}>
        let crushName = "";
        let shayariInterval;
        let currentSpotIndex = 0;

        const shayaris = [
            "Teri muskurahat se shuru hoti hai meri subah... Tere sath hi mukammal hoti hai meri har dua!",
            "Khuda se aur kya mangu tere siwa... Tu mil gayi toh jaise jannat mil gayi!",
            "Ek hi tamanna hai is dil ki... Hamesha tumhare kareeb rahun, tumhare ban kar rahun!",
            "Na chahat ki kami hai, na tammna ki... Bas ek tum mil jao, toh zindagi mukammal ho jaye!"
        ];

        function startProposal() {
            const inputVal = document.getElementById('userNameInput').value.trim();
            if (inputVal === "") {
                alert("Please ek pyaara sa naam likhiye! 😊");
                return;
            }
            
            crushName = inputVal;

            document.getElementById('nameOverlay').style.opacity = '0';
            setTimeout(() => document.getElementById('nameOverlay').style.display = 'none', 600);

            const mainCard = document.getElementById('mainProposalCard');
            mainCard.style.opacity = '1';
            mainCard.style.transform = 'scale(1)';
            mainCard.style.pointerEvents = 'auto';

            document.getElementById('questionText').innerHTML = `Hey ${crushName}, Kya tum meri bae banogi? 💍`;

            // Shuruat me No button ko Right side me safe position pe rakhna
            const noBtn = document.getElementById('noBtn');
            noBtn.style.right = '10px';
            noBtn.style.top = '70px';

            startShayariLoop();
        }

        function startShayariLoop() {
            let index = 0;
            shayariInterval = setInterval(() => {
                const textContainer = document.getElementById('shayariText');
                textContainer.style.opacity = 0;
                
                setTimeout(() => {
                    index = (index + 1) % shayaris.length;
                    textContainer.innerHTML = `"${shayaris[index]}"`;
                    textContainer.style.opacity = 1;
                }, 500);
            }, 4500);
        }

        // Foolproof Grid-Based Anti-Chhupna Jumping Engine
        function jumpToSafeSpot(e) {
            if(e) {
                e.preventDefault();
                e.stopPropagation();
            }

            const noBtn = document.getElementById('noBtn');
            const warningNotice = document.getElementById('warningNotice');
            
            // 4 Fixed Points defined strictly around Yes Button (Never overlaps)
            const spots = [
                { left: '15px', top: '20px' },    // Top Left Corner
                { right: '15px', top: '20px' },   // Top Right Corner
                { left: '15px', top: '120px' },   // Bottom Left Corner
                { right: '15px', top: '120px' }   // Bottom Right Corner
            ];

            // Next spot par cycle karna taaki random hone par bhi dobara ek hi jagah na aaye
            let nextSpotIndex = Math.floor(Math.random() * spots.length);
            while (nextSpotIndex === currentSpotIndex) {
                nextSpotIndex = Math.floor(Math.random() * spots.length);
            }
            currentSpotIndex = nextSpotIndex;
            const chosenSpot = spots[currentSpotIndex];

            // Reset previous properties to avoid css conflicts
            noBtn.style.left = 'auto';
            noBtn.style.right = 'auto';
            noBtn.style.top = 'auto';
            noBtn.style.bottom = 'auto';

            // Apply new spot positions layout
            if(chosenSpot.left) noBtn.style.left = chosenSpot.left;
            if(chosenSpot.right) noBtn.style.right = chosenSpot.right;
            if(chosenSpot.top) noBtn.style.top = chosenSpot.top;

            // Instantly show warning text
            warningNotice.innerHTML = "Are! Yes par hi click karo, No nahi kar sakti! 😜";
            warningNotice.style.opacity = '1';

            return false;
        }

        // YES Celebration Block
        function celebrateYes() {
            clearInterval(shayariInterval);

            document.getElementById('shayariText').innerHTML = `Dhadkanein badh si gayi hain tumhari haan se... ❤️`;
            document.getElementById('questionText').innerHTML = `Yayyy! I Love You So Much ${crushName}!! 💋✨`;
            
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('warningNotice').style.display = 'none';
            
            triggerHearts();
        }

        function triggerHearts() {
            const container = document.getElementById('heartBox');
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.style.position = 'absolute';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = (Math.random() * 25 + 20) + 'px';
                heart.style.opacity = Math.random();
                heart.style.transition = 'all ' + (Math.random() * 2 + 3) + 's ease-in-out';
                
                container.appendChild(heart);

                setTimeout(() => {
                    heart.style.top = '-10vh';
                    heart.style.transform = `translateX(${Math.random() * 120 - 60}px) rotate(${Math.random() * 360}deg)`;
                }, 50);

                setTimeout(() => heart.remove(), 5000);
            }, 140);
        }
    </script>
</body>
</html>
